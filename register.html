<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EventHub</title>
    <link rel="stylesheet" href="day6.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left">
            <a href="/" class="logo">EventHub</a>
        </div>
        <div class="nav-right">
            <a href="/" class="nav-link">Browse Events</a>
            <a href="/signin" class="btn-secondary">Sign In</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2> Create Account </h2>
            <p> Join EventHub</p>
            <form class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="btn-primary full-width">
                    Create Account
                </button>
            </form>
            <p class="auth-footer">Already have an account?
                <a href="/login/">Sign In</a>
            </p>
        </div>
    </div>

</body>
</html>
